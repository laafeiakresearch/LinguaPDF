<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Pronunciation & Translation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --primary: #6c63ff;
            --accent: #00e5ff;
            --dark: #0f0f1a;
            --card: #1a1a2e;
            --card2: #16213e;
            --text: #e0e0ff;
            --muted: #8888aa;
            --success: #00e676;
            --radius: 16px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: var(--card);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: var(--radius);
            padding: 20px;
            align-items: flex-end;
        }

        .control-group {
            flex: 1 1 200px;
        }

        .control-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .control-group select,
        .control-group input[type="file"] {
            width: 100%;
            background: var(--card2);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 10px;
            color: var(--text);
            padding: 10px 11px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
        }

        .control-group .warning {
            color: #ffaa00;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .btn {
            background: linear-gradient(135deg, #6c63ff, #5a52d5);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s;
            min-height: 44px;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .main {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .pdf-panel {
            flex: 2 1 600px;
            background: var(--card);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .translation-panel {
            flex: 1 1 280px;
            background: var(--card);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: var(--radius);
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .translation-panel h3 {
            color: var(--primary);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        #translationResult {
            background: var(--card2);
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .translation-placeholder {
            color: var(--muted);
            font-style: italic;
        }

        .pdf-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .page-info {
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--primary);
        }

        #pdfViewer {
            width: 100%;
            overflow: auto;
            background: #111122;
            border-radius: 12px;
            max-height: 70vh;
            position: relative;
        }

        .pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .page-wrapper {
            position: relative;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
        }

        .textLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            cursor: text;
        }
        .textLayer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            border-radius: 3px;
            transition: background 0.15s;
        }
        .textLayer span:hover {
            background: rgba(108, 99, 255, 0.3) !important;
        }
        .textLayer span.selected {
            background: rgba(0, 229, 255, 0.4) !important;
        }

        .status {
            background: #0d2b1a;
            color: var(--success);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="control-group">
            <label>🌐 Language of PDF</label>
            <select id="languageSelect">
                <option value="hi">🇮🇳 Hindi</option>
                <option value="bn">🇧🇩 Bengali</option>
                <option value="ta">🇮🇳 Tamil</option>
                <option value="te">🇮🇳 Telugu</option>
                <option value="mr">🇮🇳 Marathi</option>
                <option value="gu">🇮🇳 Gujarati</option>
                <option value="pa">🇮🇳 Punjabi</option>
                <option value="ja">🇯🇵 Japanese</option>
                <option value="ru">🇷🇺 Russian</option>
                <option value="en">🇺🇸 English (US)</option>
                <option value="de">🇩🇪 German</option>
                <option value="fr">🇫🇷 French</option>
                <!-- Additional languages -->
                <option value="es">🇪🇸 Spanish</option>
                <option value="zh">🇨🇳 Chinese</option>
                <option value="ar">🇸🇦 Arabic</option>
                <option value="ko">🇰🇷 Korean</option>
            </select>
        </div>
        <div class="control-group">
            <label>🎤 Voice for pronunciation</label>
            <select id="voiceSelect" disabled>
                <option value="">-- Select a voice --</option>
            </select>
            <div id="voiceWarning" class="warning"></div>
        </div>
        <div class="control-group">
            <label>📄 Upload PDF</label>
            <input type="file" id="fileInput" accept=".pdf">
        </div>
        <div>
            <button class="btn" id="activateBtn">🔊 Activate Voice</button>
        </div>
    </div>

    <div class="main">
        <!-- PDF viewer panel -->
        <div class="pdf-panel">
            <div class="pdf-toolbar">
                <div>
                    <button class="btn" id="prevPage" disabled>⬅ Prev</button>
                    <span class="page-info" id="pageInfo">Page 1/1</span>
                    <button class="btn" id="nextPage" disabled>Next ➡</button>
                </div>
                <div id="pdfStatus" class="status"></div>
            </div>
            <div id="pdfViewer">
                <div class="pdf-container" id="pdfContainer">
                    <div style="color: var(--muted); text-align: center; padding: 40px;">Upload a PDF to begin</div>
                </div>
            </div>
        </div>

        <!-- Translation panel -->
        <div class="translation-panel">
            <h3>📘 English Meaning</h3>
            <div id="translationResult">
                <span class="translation-placeholder">Select text on the PDF to see its English translation...</span>
            </div>
        </div>
    </div>
</div>

<!-- Load pdf.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    (function() {
        // Configure pdf.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // DOM elements
        const languageSelect = document.getElementById('languageSelect');
        const voiceSelect = document.getElementById('voiceSelect');
        const voiceWarning = document.getElementById('voiceWarning');
        const fileInput = document.getElementById('fileInput');
        const activateBtn = document.getElementById('activateBtn');
        const prevBtn = document.getElementById('prevPage');
        const nextBtn = document.getElementById('nextPage');
        const pageInfo = document.getElementById('pageInfo');
        const pdfContainer = document.getElementById('pdfContainer');
        const pdfStatus = document.getElementById('pdfStatus');
        const translationDiv = document.getElementById('translationResult');

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let allVoices = [];
        let selectedVoice = null;
        let isVoiceActivated = false;
        let currentLanguage = languageSelect.value;
        let selectedText = '';   // last selected text

        // ------------------------------------------------------------------
        // 1. Voice management
        // ------------------------------------------------------------------
        function loadVoices() {
            allVoices = window.speechSynthesis.getVoices();
            updateVoiceDropdown();
        }

        function updateVoiceDropdown() {
            const lang = languageSelect.value;
            const filtered = allVoices.filter(v => v.lang.startsWith(lang) || v.lang.startsWith(lang + '-'));
            voiceSelect.innerHTML = '<option value="">-- Select a voice --</option>';

            if (filtered.length === 0) {
                voiceSelect.disabled = true;
                voiceWarning.textContent = '⚠️ No voice available for this language. TTS disabled.';
            } else {
                voiceSelect.disabled = false;
                voiceWarning.textContent = '';
                filtered.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name;
                    opt.textContent = `${v.name} (${v.lang})`;
                    voiceSelect.appendChild(opt);
                });
                // Try to select a default (first one)
                voiceSelect.value = filtered[0].name;
                selectedVoice = filtered[0];
            }
        }

        // Listen for voice changes (they load asynchronously)
        window.speechSynthesis.onvoiceschanged = loadVoices;
        // Also try to load immediately
        loadVoices();

        languageSelect.addEventListener('change', function() {
            currentLanguage = languageSelect.value;
            updateVoiceDropdown();
        });

        voiceSelect.addEventListener('change', function() {
            const name = voiceSelect.value;
            selectedVoice = allVoices.find(v => v.name === name) || null;
        });

        // ------------------------------------------------------------------
        // 2. Activate voice (ensures speech synthesis is ready)
        // ------------------------------------------------------------------
        activateBtn.addEventListener('click', function() {
            // A tiny dummy utterance to "wake up" speech synthesis
            const utter = new SpeechSynthesisUtterance(' ');
            utter.volume = 0;
            window.speechSynthesis.speak(utter);
            isVoiceActivated = true;
            pdfStatus.style.display = 'block';
            pdfStatus.textContent = '✅ Voice activated. You can now select text to hear it.';
            setTimeout(() => { pdfStatus.style.display = 'none'; }, 3000);
        });

        // ------------------------------------------------------------------
        // 3. PDF handling
        // ------------------------------------------------------------------
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            loadPDF(file);
        });

        async function loadPDF(file) {
            pdfStatus.style.display = 'block';
            pdfStatus.textContent = '⏳ Loading PDF...';
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                totalPages = pdfDoc.numPages;
                currentPage = 1;
                updateNavButtons();
                await renderPage(currentPage);
                pdfStatus.textContent = `✅ Loaded ${totalPages} pages. Click or drag to select text.`;
            } catch (err) {
                pdfStatus.textContent = '❌ Failed to load PDF. Make sure it is a valid text-based PDF.';
                console.error(err);
            }
        }

        async function renderPage(pageNum) {
            if (!pdfDoc) return;

            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 });  // Adjust scale for readability

            // Clear container and create wrapper
            pdfContainer.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';

            // Canvas for rendering
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');

            // Render page to canvas
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;

            // Text layer for selection
            const textLayer = document.createElement('div');
            textLayer.className = 'textLayer';

            wrapper.appendChild(canvas);
            wrapper.appendChild(textLayer);
            pdfContainer.appendChild(wrapper);

            // Extract text content and create spans
            const textContent = await page.getTextContent();
            textContent.items.forEach(item => {
                if (!item.str.trim()) return;

                const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
                const span = document.createElement('span');
                span.textContent = item.str;
                span.style.left = tx[4] + 'px';
                span.style.top = (tx[5] - item.height * viewport.scale) + 'px';
                span.style.fontSize = Math.abs(tx[0]) + 'px';
                span.style.fontFamily = item.fontName || 'sans-serif';

                // Store the raw text for later use
                span.dataset.text = item.str;

                // Add click and selection handling
                span.addEventListener('mouseup', handleTextSelection);
                span.addEventListener('touchend', handleTextSelection);

                textLayer.appendChild(span);
            });

            // Also listen for selection on the whole text layer (for drag selections)
            textLayer.addEventListener('mouseup', handleTextSelection);
            textLayer.addEventListener('touchend', handleTextSelection);
        }

        // ------------------------------------------------------------------
        // 4. Text selection handling
        // ------------------------------------------------------------------
        function handleTextSelection(event) {
            // Allow time for the selection to be registered
            setTimeout(() => {
                const selection = window.getSelection();
                const text = selection.toString().trim();
                if (text.length === 0) return;

                selectedText = text;

                // 4a. Pronounce the selected text
                speakText(text);

                // 4b. Translate the selected text
                translateText(text, currentLanguage);
            }, 50);
        }

        function speakText(text) {
            if (!isVoiceActivated) {
                alert('Please click "Activate Voice" first.');
                return;
            }
            if (!selectedVoice) {
                alert('Please select a voice.');
                return;
            }

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = selectedVoice;
            utterance.lang = selectedVoice.lang;
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            // Optional: highlight the spoken text briefly
            utterance.onstart = () => {
                pdfStatus.style.display = 'block';
                pdfStatus.textContent = `🔊 Speaking: "${text.substring(0, 40)}${text.length > 40 ? '…' : ''}"`;
            };
            utterance.onend = () => {
                pdfStatus.style.display = 'none';
            };
            utterance.onerror = () => {
                pdfStatus.style.display = 'none';
            };

            window.speechSynthesis.speak(utterance);
        }

        // ------------------------------------------------------------------
        // 5. Translation via MyMemory API
        // ------------------------------------------------------------------
        async function translateText(text, sourceLang) {
            translationDiv.innerHTML = '⏳ Translating...';
            try {
                // MyMemory API endpoint (free, no key required)
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|en`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === 200) {
                    const translated = data.responseData.translatedText;
                    translationDiv.innerHTML = `
                        <strong>Selected:</strong> <span style="color: var(--accent);">${escapeHtml(text)}</span><br><br>
                        <strong>English:</strong> ${escapeHtml(translated)}
                    `;
                } else {
                    translationDiv.innerHTML = `❌ Translation failed: ${data.responseDetails || 'Unknown error'}`;
                }
            } catch (err) {
                translationDiv.innerHTML = '❌ Network error. Please try again.';
                console.error(err);
            }
        }

        // Simple escape to prevent XSS
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // ------------------------------------------------------------------
        // 6. Page navigation
        // ------------------------------------------------------------------
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));

        async function changePage(delta) {
            if (!pdfDoc) return;
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            currentPage = newPage;
            await renderPage(currentPage);
            updateNavButtons();
        }

        function updateNavButtons() {
            if (!pdfDoc) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                pageInfo.textContent = 'Page 1/1';
                return;
            }
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
            pageInfo.textContent = `Page ${currentPage}/${totalPages}`;
        }

        // ------------------------------------------------------------------
        // 7. Initialization
        // ------------------------------------------------------------------
        // Set a default language and load voices
        languageSelect.value = 'en';
        currentLanguage = 'en';
        updateVoiceDropdown();

        // If user wants to use a different language, they'll change the dropdown.
    })();
</script>
</body>
</html>
